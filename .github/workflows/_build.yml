name: Build

on:
    workflow_call:
            upload_artifact:
                description: 'Upload artifact'
                type: boolean
                required: true
                default: false
permissions:
    contents: read
    checks: write

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout Repo
                uses: actions/checkout@v4
                with:
                    submodules: true
            -   name: Setup Go
                uses: actions/setup-go@v5
                with:
                    go-version: 1.21
#            -   name: Build Library
#                run: |
#                    go mod download
#                    go build -tags "${BUILD_TAGS}" -gcflags="all=-N -l" -o portal ./cmd/portal
            - uses: actions/upload-artifact@v3
              if: ${{ inputs.upload_artifact }}
              with:
                  name: build-${{ github.sha }}
                  path: ./
    golangci:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: '1.21'
                  cache: false
            - name: golangci-lint
              uses: golangci/golangci-lint-action@v4
              with:
                  version: v1.54
